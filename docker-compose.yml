services:
  # PostgreSQL Database - pornește primul
  postgres:
    image: postgres:15
    container_name: cvisor_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d # Auto-run migrations la primul start
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cvisor-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Redis Cache & Queue
  redis:
    image: redis:alpine
    container_name: cvisor_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    networks:
      - cvisor-network
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cvisor_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/archive:/app/archive
    networks:
      - cvisor-network
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: cvisor_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL} # Pentru browser
      - API_URL=http://backend:5000 # Pentru server-side
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    networks:
      - cvisor-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  nginx:
    # Use image and mount config + certs instead of build context, for consistency
    image: nginx:alpine
    container_name: cvisor_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/ssl/certs:ro # Mount generated public cert here? No, default.conf expects /etc/ssl/certs/cert.pem
      # Let's map specific files to match default.conf paths
      - ./nginx/certs/cert.pem:/etc/ssl/certs/cert.pem:ro
      - ./nginx/certs/key.pem:/etc/ssl/private/key.pem:ro
      - ./backend/uploads:/app/uploads
    networks:
      - cvisor-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

networks:
  cvisor-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
